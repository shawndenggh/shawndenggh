name: Generate contribution snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate contribution grid snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            output/github-contribution-grid-snake.svg?palette=github
            output/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Commit and push generated assets
        uses: EndBug/add-and-commit@v9
        with:
          default_author: github_actions
          message: "chore: update contribution snake"
